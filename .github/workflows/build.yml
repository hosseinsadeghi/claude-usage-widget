name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.script }} -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.yml
          if-no-files-found: ignore

  sign-windows:
    needs: build
    runs-on: ubuntu-latest
    if: vars.SIGNPATH_SIGNING_POLICY_SLUG != ''
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-windows-latest
          path: artifacts

      - uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: claude-usage-widget
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: electron-exe
          github-artifact-id: dist-windows-latest
          output-artifact-directory: signed

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows-signed
          path: signed/*

  release:
    needs: [build, sign-windows]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      # Try signed Windows artifact first, fall back to unsigned
      - uses: actions/download-artifact@v4
        with:
          name: dist-windows-signed
          path: artifacts
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: dist-windows-latest
          path: artifacts
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: dist-macos-latest
          path: artifacts
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu-latest
          path: artifacts
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
